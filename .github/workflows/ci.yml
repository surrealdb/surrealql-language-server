name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out tree-sitter grammar
        run: git clone --depth 1 https://github.com/ForetagInc/tree-sitter-surrealql ../tree-sitter-surrealql
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run tests
        run: cargo test --workspace

  zed-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Check extension assets
        run: |
          test -f extensions/zed-surrealql/extension.toml
          test -f extensions/zed-surrealql/grammars/surrealql.wasm
          test -f extensions/zed-surrealql/languages/surql/config.toml
      - name: Build Zed extension
        run: cargo check --manifest-path extensions/zed-surrealql/Cargo.toml --target wasm32-wasip2
