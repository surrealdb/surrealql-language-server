name: CI

on:
    push:
        branches:
            - '**'
        tags:
            - 'v*'
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    rust:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - name: Check out tree-sitter grammar
              run: git clone --depth 1 https://github.com/surrealdb/surrealql-tree-sitter ../surrealql-tree-sitter
            - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
                  components: rustfmt
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
              name: Cache Rust Artifacts
            - name: Check formatting
              run: cargo fmt --check
            - name: Run tests
              run: cargo test

    release:
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact: surreal-language-server
                      asset: surreal-language-server-linux-amd64
                    - os: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                      artifact: surreal-language-server
                      asset: surreal-language-server-linux-arm64
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact: surreal-language-server
                      asset: surreal-language-server-macos-arm64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: surreal-language-server.exe
                      asset: surreal-language-server-windows-amd64.exe
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - name: Check out tree-sitter grammar
              run: git clone --depth 1 https://github.com/surrealdb/surrealql-tree-sitter ../surrealql-tree-sitter
            - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
                  targets: ${{ matrix.target }}
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
              name: Cache Rust Artifacts
            - name: Build
              run: cargo build --release --target ${{ matrix.target }}
            - name: Rename artifact
              shell: bash
              run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.asset }}
            - name: Upload release asset
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
              with:
                  files: ${{ matrix.asset }}

    publish:
        if: startsWith(github.ref, 'refs/tags/v')
        needs: release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - name: Check out tree-sitter grammar
              run: git clone --depth 1 https://github.com/surrealdb/surrealql-tree-sitter ../surrealql-tree-sitter
            - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
              name: Cache Rust Artifacts
            - name: Publish to crates.io
              run: cargo publish
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
                  TREE_SITTER_SURREALQL_DIR: ${{ github.workspace }}/../surrealql-tree-sitter
