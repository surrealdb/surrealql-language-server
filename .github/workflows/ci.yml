name: CI

on:
    push:
        branches:
            - '**'
        tags:
            - 'v*'
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    rust:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - name: Check out tree-sitter grammar
              run: git clone --depth 1 https://github.com/surrealdb/surrealql-tree-sitter ../surrealql-tree-sitter
            - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
                  components: rustfmt
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
              name: Cache Rust Artifacts
            - name: Check formatting
              run: cargo fmt --check
            - name: Run tests
              run: cargo test

    release:
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact: surrealql-language-server
                      asset: surrealql-language-server-linux-amd64
                      bin_dir: target/x86_64-unknown-linux-gnu/release
                    - os: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                      artifact: surrealql-language-server
                      asset: surrealql-language-server-linux-arm64
                      bin_dir: target/aarch64-unknown-linux-gnu/release
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact: surrealql-language-server
                      asset: surrealql-language-server-macos-arm64
                      bin_dir: target/aarch64-apple-darwin/release
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: surrealql-language-server.exe
                      asset: surrealql-language-server-windows-amd64.exe
                      bin_dir: target/x86_64-pc-windows-msvc/release
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - name: Check out tree-sitter grammar
              run: git clone --depth 1 https://github.com/surrealdb/surrealql-tree-sitter ../surrealql-tree-sitter
            - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
                  targets: ${{ matrix.target }}
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
              name: Cache Rust Artifacts
            - name: Build
              run: cargo build --release --target ${{ matrix.target }}
            - name: Rename artifact
              shell: bash
              run: cp ${{ matrix.bin_dir }}/${{ matrix.artifact }} ${{ matrix.asset }}
            - name: Upload release asset
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
              with:
                  files: ${{ matrix.asset }}

    publish:
        if: startsWith(github.ref, 'refs/tags/v')
        needs: release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - name: Check out tree-sitter grammar
              run: git clone --depth 1 https://github.com/surrealdb/surrealql-tree-sitter ../surrealql-tree-sitter
            - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
              name: Cache Rust Artifacts
            - name: Publish to crates.io
              run: cargo publish
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
                  TREE_SITTER_SURREALQL_DIR: ${{ github.workspace }}/../surrealql-tree-sitter

    wasm:
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: write
            id-token: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - name: Check out tree-sitter grammar
              run: git clone --depth 1 https://github.com/surrealdb/surrealql-tree-sitter ../surrealql-tree-sitter
            - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
                  targets: wasm32-unknown-unknown
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
              name: Cache Rust Artifacts
            - name: Install wasm-bindgen-cli
              run: command -v wasm-bindgen && wasm-bindgen --version | grep -q 0.2.108 || cargo install -f wasm-bindgen-cli --version 0.2.108
            - name: Install wasm-opt
              run: command -v wasm-opt || cargo install wasm-opt
            - name: Build wasm package
              run: bash scripts/build-wasm.sh
            # Do not set registry-url here — it writes an .npmrc that forces
            # NODE_AUTH_TOKEN auth and breaks npm OIDC trusted publishing.
            - name: Set up Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: '24'
            - name: Ensure npm supports OIDC trusted publishing
              run: npm install -g npm@latest && npm --version
            - name: Align npm package version with release tag
              working-directory: pkg
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  npm pkg set "version=${VERSION}"
            - name: Pack npm tarball
              working-directory: pkg
              run: npm pack
            - name: Dry run publish to npm
              working-directory: pkg
              run: npm publish --dry-run --access public
            - name: Publish to npm
              working-directory: pkg
              run: npm publish --access public
            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
              with:
                  files: pkg/*.tgz
